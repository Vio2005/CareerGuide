{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="adminHMD authentication page">
  <title>Login | adminHMD</title>

  
  <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'assets/vendors/bootstrap-icons/bootstrap-icons.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>

<body class="auth-body">
  <button class="icon-button theme-toggle auth-theme-toggle" type="button" data-theme-toggle aria-label="Switch color theme" title="Switch color theme">
    <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
  </button>
  <main class="auth-page">
    <section class="auth-card">
      <a class="auth-brand" href="index.html"><span class="brand-icon"><i class="bi bi-person-fill" aria-hidden="true"></i></span><span><strong>Admin</strong><small>Sign in to your admin workspace.</small></span></a>
      <form action="{% url 'login' %}" method="post"  >
        {% csrf_token %}
        <div class="mb-4">
          <p class="eyebrow mb-1">Secure Access</p>
          <h1 class="h3 mb-1">Login</h1>
          <p class="text-muted mb-0">Sign in to your admin workspace.</p>
        </div>
        <div class="mb-3"><label class="form-label" for="username">Username</label><input class="form-control" id="loginEmail" type="text" name="username" required><div class="invalid-feedback">Username</div></div>
        <div class="mb-3"><div class="d-flex justify-content-between"><label class="form-label" for="loginPassword">Password</label>
          <!--<a class="small fw-semibold" href="forgot-password.html">Forgot?</a>--></div>
          <input class="form-control" id="loginPassword" type="password"  name="password" required><div class="invalid-feedback">Password </div></div>
       <!---- <div class="form-check mb-4"><input class="form-check-input" type="checkbox" id="rememberMe"><label class="form-check-label" for="rememberMe">Remember me</label></div>-->
        <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right" aria-hidden="true"></i> Sign In</button>
      </form>
      
      <div class="auth-footer">New here? <a href="{% url 'register' %}">Create an account</a></div>
    </section>
  </main>

  <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>
  <script src="{% static 'assets/js/main.js' %}"></script>
</body>
</html>
