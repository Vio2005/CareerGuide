{% extends 'admin.html' %}
{% block content %}
{% load static %}

<main class="dashboard-content">

    <div class="container-fluid px-3 px-lg-4 py-4">


        <div class="page-heading">

            <div class="page-heading-copy">

                <span class="page-icon">
                    <i class="bi bi-bar-chart-line" aria-hidden="true"></i>
                </span>

                <div>
                    <p class="eyebrow mb-1">Analytics</p>
                    <h1 class="h3 mb-1">Charts</h1>
                    <p class="text-muted mb-0">
                        Visualize job platform performance and statistics.
                    </p>
                </div>

            </div>

        </div>



        <section class="row g-3 mt-1">


            <!-- Monthly Applications Bar Chart -->
            <div class="col-12 col-xl-8">

                <div class="panel h-100">

                    <div class="panel-header">

                        <h2 class="h5">
                            <i class="bi bi-bar-chart"></i>
                            Monthly Applications
                        </h2>

                    </div>


                    <div style="height:350px; padding:20px;">

                        <canvas id="monthlyChart"></canvas>

                    </div>


                </div>

            </div>





            <!-- Popular Position Doughnut -->
            <div class="col-12 col-xl-4">


                <div class="panel h-100">


                    <div class="panel-header">

                        <h2 class="h5">
                            <i class="bi bi-pie-chart"></i>
                            Popular Positions
                        </h2>

                    </div>


                    <div style="height:300px;">

                        <canvas id="positionChart"></canvas>

                    </div>


                </div>


            </div>


        </section>





        <section class="row g-3 mt-1">


            <!-- Last 30 Days Line Chart -->
            <div class="col-12 col-xl-8">


                <div class="panel h-100">


                    <div class="panel-header">

                        <h2 class="h5">
                            <i class="bi bi-graph-up"></i>
                            Last 30 Days Applications
                        </h2>

                    </div>


                    <div style="height:350px; padding:20px;">

                        <canvas id="dailyChart"></canvas>

                    </div>


                </div>


            </div>





            <!-- Application Status Pie Chart -->
            <div class="col-12 col-xl-4">


                <div class="panel h-100">


                    <div class="panel-header">

                        <h2 class="h5">
                            <i class="bi bi-pie-chart-fill"></i>
                            Application Status
                        </h2>

                    </div>


                    <div style="height:300px;">

                        <canvas id="statusChart"></canvas>

                    </div>


                </div>


            </div>



        </section>


    </div>


</main>






{% endblock content %}
