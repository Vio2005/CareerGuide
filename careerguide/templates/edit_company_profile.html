<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="POST" enctype="multipart/form-data">

{% csrf_token %}




<div class="card">

<h2>Company Information</h2>


<label>Company Name</label>
<input type="text"
       name="company_name"
       value="{{ company.company_name }}"
       required>


<label>Email</label>
<input type="email"
        name="email"
       value="{{ company.email }}"
       required>


<label>Phone</label>
<input type="text"
       name="phone"
       value="{{ company.phone }}">

       <label>Address</label>
<input type="text"
       name="address"
       value="{{ company.address }}">

<label>Website</label>
<input type="text"
       name="website"
       value="{{ company.website }}">


<label>Description</label>

<textarea name="description">
{{ company.description }}
</textarea>



<label>Profile Image</label>

{% if company.profile_image %}

<img src="{{ company.profile_image.url }}"
     width="120"
     height="120">

{% endif %}


<input type="file"
       name="profile_image">


</div>



<button type="submit">
Update Profile
</button>


</form>
</body>
</html>
